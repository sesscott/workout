function renderDonePhase(body,w){
  const duration=Math.round((Date.now()-w.startTime)/60000);
  const vol=estimatedVolume();

  const doneBox=dv({cls:"wf-done-box"});
  doneBox.appendChild(dv({cls:"wf-done-title"},"DONE"));
  doneBox.appendChild(dv({cls:"ss",style:{fontSize:"12px",color:"#888",marginBottom:"14px"}},w.dayLabel));

  const stats=dv({cls:"wf-done-stat"});
  [[duration+"m","DURATION"],[String(w.totalSets),"SETS"],[vol?vol+" lbs":"—","EST. VOLUME"]].forEach(([v,l])=>{
    const stc=dv({cls:"wf-done-stc"});
    stc.appendChild(dv({cls:"val"},v));
    stc.appendChild(dv({cls:"lbl"},l));
    stats.appendChild(stc);
  });
  doneBox.appendChild(stats);

  if(Object.keys(w.loggedWeights).length>0){
    doneBox.appendChild(dv({cls:"bb",style:{fontSize:"10px",color:"#444",letterSpacing:"2px",marginBottom:"8px"}},"LOGGED WEIGHTS"));
    const list=dv({cls:"wf-done-exlist"});
    Object.entries(w.loggedWeights).forEach(([name,weight])=>{
      const prev=S.exerciseWeights[name];
      const isPR=prev&&parseFloat(weight)>parseFloat(prev.weight);
      const row=dv({cls:"wf-done-exrow"});
      row.appendChild(dv({cls:"exn"},name));
      const rightPart=dv({style:{display:"flex",alignItems:"center",gap:"6px"}});
      rightPart.appendChild(dv({cls:"exw"},weight));
      if(isPR)rightPart.appendChild(dv({cls:"pr"},"PR"));
      row.appendChild(rightPart);
      list.appendChild(row);
    });
    doneBox.appendChild(list);
  }

  const btns=dv({cls:"wf-done-btns"});
  btns.appendChild(bt({cls:"wf-save-session-btn",onClick:saveSession},"SAVE SESSION"));
  btns.appendChild(bt({cls:"wf-back-btn",style:{border:"1px solid #22252e"},onClick:()=>{
    stopAllTimers();releaseWakeLock();S.workout=null;render();
  }},"BACK TO PLAN"));
  doneBox.appendChild(btns);
  body.appendChild(doneBox);
}

// ═══════════════════════════════════════════
// RENDER HISTORY TAB
// ═══════════════════════════════════════════
function renderHistory(phase){
  const f=document.createDocumentFragment();
  f.appendChild(dv({cls:"mb14"},
    dv({cls:"bb",style:{fontSize:"20px",color:"#fff",letterSpacing:"2px"}},"WORKOUT HISTORY"),
    dv({cls:"ss",style:{fontSize:"11px",color:"#888",marginTop:"3px"}},"Your past sessions.")
  ));

  if(S.history.length===0){
    f.appendChild(dv({cls:"ss",style:{fontSize:"13px",color:"#444",padding:"30px",textAlign:"center",border:"1px dashed #1e2028",borderRadius:"8px"}},"No sessions yet. Start a workout from the PLAN tab."));
    return f;
  }

  // View toggle: sessions vs. per-exercise
  if(!S.histView)S.histView="sessions";
  const viewRow=dv({cls:"f g6 mb10"});
  [["SESSIONS","sessions"],["BY EXERCISE","exercise"]].forEach(([l,v])=>{
    const act=S.histView===v;
    viewRow.appendChild(bt({cls:"sbtn mm",style:{background:act?"#e8c547":"#14161c",color:act?"#0c0d10":"#666",border:act?"none":"1px solid #22252e"},
      onClick:()=>set({histView:v})},l));
  });
  f.appendChild(viewRow);

  if(S.histView==="exercise"){
    // Build per-exercise aggregation from history (oldest first for display)
    const byEx={};
    const orderedHistory=[...S.history].reverse(); // oldest first
    orderedHistory.forEach(sess=>{
      Object.entries(sess.weights||{}).forEach(([name,weight])=>{
        if(!byEx[name])byEx[name]=[];
        byEx[name].push({date:sess.date,weight,sets:sess.exerciseSets?.[name]||null});
      });
    });

    const exNames=Object.keys(byEx).sort();
    if(exNames.length===0){
      f.appendChild(dv({cls:"ss",style:{fontSize:"13px",color:"#444",padding:"30px",textAlign:"center",border:"1px dashed #1e2028",borderRadius:"8px"}},"No exercise data yet."));
    } else {
      exNames.forEach(name=>{
        const entries=byEx[name]; // oldest to newest
        const isOpenEx=S.expandedExName===name;
        const card=dv({cls:"exprog-section"});

        const hdr=dv({cls:"exprog-hdr",onClick:()=>set({expandedExName:isOpenEx?null:name})});
        const left=dv({});
        const latest=entries[entries.length-1];
        const first=entries[0];
        const gained=entries.length>1?(parseFloat(latest.weight)-parseFloat(first.weight)).toFixed(1):null;
        left.appendChild(dv({cls:"ss",style:{fontSize:"13px",color:"#ddd",fontWeight:600}},name));
        const sub=dv({cls:"mm",style:{fontSize:"9px",color:"#555",marginTop:"2px"}});
        sub.appendChild(document.createTextNode(entries.length+" sessions · latest: "+latest.weight));
        if(gained!==null){
          const dir=parseFloat(gained)>0?"+":"";
          const gc=parseFloat(gained)>0?"#6cc97e":"#e05252";
          sub.appendChild(sp({style:{color:gc,marginLeft:"6px"}},dir+gained+" lbs total"));
        }
        left.appendChild(sub);
        hdr.appendChild(left);
        hdr.appendChild(dv({style:{color:"#444",fontSize:"16px",flexShrink:0}},isOpenEx?"▲":"▼"));
        card.appendChild(hdr);

        const body=dv({cls:"exprog-body"+(isOpenEx?" open":"")});
        // Show table: date | weight | delta
        let prevW=null;
        entries.forEach((e,ei)=>{
          const row=dv({cls:"exprog-row"});
          row.appendChild(dv({cls:"ed"},e.date));
          const right=dv({style:{display:"flex",alignItems:"center",gap:"8px"}});
          right.appendChild(dv({cls:"ew"},e.weight));
          if(prevW!==null){
            const delta=(parseFloat(e.weight)-parseFloat(prevW)).toFixed(1);
            if(delta!=="0.0"&&!isNaN(parseFloat(delta))){
              const isPR=parseFloat(delta)>0;
              if(isPR)right.appendChild(dv({cls:"epr"},"+"+delta+" PR"));
              else right.appendChild(dv({style:{fontFamily:"'Courier New',Courier,monospace",fontSize:"10px",color:"#e05252"}},delta));
            }
          }
          row.appendChild(right);
          body.appendChild(row);
          prevW=e.weight;
        });
        card.appendChild(body);
        f.appendChild(card);
      });
    }
    return f;
  }

  // Default: sessions view
  S.history.forEach((sess,idx)=>{
    const isOpen=S.expandedHistIdx===idx;
    // Compute session volume
    let sesVol=0;
    Object.entries(sess.weights||{}).forEach(([name,weight])=>{
      const match=weight.match(/(\d+\.?\d*)/);
      if(match){
        const sets=sess.exerciseSets?.[name]||3;
        sesVol+=parseFloat(match[1])*sets;
      }
    });

    const card=dv({cls:"hist-session"});

    const hdr=dv({cls:"hist-session-hdr",onClick:()=>set({expandedHistIdx:isOpen?null:idx})});
    const left=dv({});
    left.appendChild(dv({cls:"bb",style:{fontSize:"14px",color:"#fff",letterSpacing:"1px"}},sess.dayLabel));
    left.appendChild(dv({cls:"mm",style:{fontSize:"10px",color:"#555",marginTop:"3px"}},
      sess.date+"  ·  "+sess.duration+"m  ·  "+sess.totalSets+" sets"+(sesVol>0?"  ·  ~"+sesVol+" lbs vol":"")));
    hdr.appendChild(left);
    hdr.appendChild(dv({style:{color:"#444",fontSize:"16px"}},isOpen?"▲":"▼"));
    card.appendChild(hdr);

    const body=dv({cls:"hist-session-body"+(isOpen?" open":"")});
    if(Object.keys(sess.weights||{}).length>0){
      Object.entries(sess.weights).forEach(([name,weight])=>{
        const row=dv({cls:"hist-ex-row"});
        row.appendChild(dv({cls:"hn"},name));
        row.appendChild(dv({cls:"hw"},weight));
        body.appendChild(row);
      });
    } else {
      body.appendChild(dv({cls:"ss",style:{fontSize:"11px",color:"#555",padding:"6px 0"}},"No weights logged."));
    }
    const delBtn=bt({cls:"delbtn",style:{marginTop:"10px"},onClick:()=>{
      if(confirm("Delete this session?")){
        S.history.splice(idx,1);
        saveH();
        render();
      }
    }},"delete session");
    body.appendChild(delBtn);
    card.appendChild(body);
    f.appendChild(card);
  });

  return f;
}

// ═══════════════════════════════════════════
// RENDER PROGRESS TAB
// ═══════════════════════════════════════════
function renderProgress(phase){
  const f=document.createDocumentFragment();
  f.appendChild(dv({cls:"mb14"},
    dv({cls:"bb",style:{fontSize:"20px",color:"#fff",letterSpacing:"2px"}},"PROGRESS LOG"),
    dv({cls:"ss",style:{fontSize:"11px",color:"#888",marginTop:"3px"}},"Saves permanently to your browser.")
  ));

  const sec=dv({style:{background:"#13151b",border:"1px solid #1e2028",borderRadius:"8px",padding:"14px"}});
  sec.appendChild(dv({cls:"bb mb8",style:{fontSize:"11px",color:phase.color,letterSpacing:"2px"}},"LOG NEW ENTRY"));

  const di=ip({cls:"pi",type:"date",style:{width:"135px"}});
  const wi=ip({cls:"pi",placeholder:"Weight (lbs)",type:"number",min:"100",max:"400",step:".1",style:{width:"125px"}});
  const bi=ip({cls:"pi",placeholder:"Body fat %",type:"number",min:"5",max:"50",step:".1",style:{width:"115px"}});
  const ni=ip({cls:"pi",placeholder:"Notes (optional)",style:{width:"170px"}});
  di.value=new Date().toISOString().split("T")[0];

  sec.appendChild(dv({style:{display:"flex",gap:"7px",flexWrap:"wrap",alignItems:"flex-end",marginBottom:"4px"}},di,wi,bi,ni,
    bt({cls:"savbtn",onClick:()=>{
      if(!wi.value){wi.style.borderColor="#e05252";wi.focus();return;}
      S.progress.unshift({id:Date.now(),date:di.value,weight:wi.value,bf:bi.value,notes:ni.value});
      saveP();wi.value="";bi.value="";ni.value="";wi.style.borderColor="#2a2d36";render();
    }},"SAVE")
  ));

  if(S.progress.length>=2){
    const first=S.progress[S.progress.length-1],latest=S.progress[0];
    const wd=(parseFloat(latest.weight)-parseFloat(first.weight)).toFixed(1);
    const wc=parseFloat(wd)<=0?"#6cc97e":"#e05252";
    const sr=dv({style:{display:"flex",gap:"7px",flexWrap:"wrap",marginTop:"12px",marginBottom:"7px"}});
    [[latest.weight+" lbs","CURRENT",phase.color],[first.weight+" lbs","STARTED","#888"],
     [(parseFloat(wd)>0?"+":"")+wd+" lbs","CHANGE",wc],
     ...(latest.bf?[[latest.bf+"%","CURRENT BF",phase.color]]:[])
    ].forEach(([v,l,c])=>{
      sr.appendChild(dv({cls:"stc"},dv({cls:"bb",style:{fontSize:"15px",color:c}},v),dv({cls:"mm",style:{fontSize:"8px",color:"#555",letterSpacing:"1px"}},l)));
    });
    sec.appendChild(sr);
  }

  if(S.progress.length>0){
    sec.appendChild(dv({cls:"bb mt14 mb6",style:{fontSize:"10px",color:"#444",letterSpacing:"2px"}},"HISTORY"));
    S.progress.forEach(e=>{
      sec.appendChild(dv({cls:"pe"},
        dv({style:{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"center"}},
          dv({cls:"mm",style:{fontSize:"10px",color:"#666"}},e.date),
          dv({cls:"bb",style:{fontSize:"16px",color:phase.color,letterSpacing:"1px"}},e.weight+" lbs"),
          e.bf?dv({cls:"mm",style:{fontSize:"10px",color:"#aaa"}},e.bf+"% BF"):null,
          e.notes?dv({cls:"ss",style:{fontSize:"10px",color:"#666"}},e.notes):null
        ),
        bt({cls:"delbtn",onClick:()=>{S.progress=S.progress.filter(x=>x.id!==e.id);saveP();render();}},"delete")
      ));
    });
  } else {
    sec.appendChild(dv({cls:"ss",style:{fontSize:"12px",color:"#444",marginTop:"14px",padding:"18px",textAlign:"center",border:"1px dashed #1e2028",borderRadius:"6px"}},"No entries yet. Log your first weigh-in above."));
  }
  f.appendChild(sec);

  f.appendChild(dv({style:{marginTop:"12px",background:"#13151b",border:`1px solid ${phase.color}20`,borderLeft:`3px solid ${phase.color}`,borderRadius:"6px",padding:"11px 13px"}},
    dv({cls:"bb mb6",style:{fontSize:"11px",color:phase.color,letterSpacing:"2px"}},"NUTRITION TARGETS"),
    dv({cls:"ss",style:{fontSize:"11px",color:"#777",lineHeight:"2"}},...NUTR_STD.map(t=>dv({},t)))
  ));
  return f;
}

// ═══════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  // If in workout mode, show overlay
  if(S.workout){
    const overlay=renderWorkoutOverlay();
    if(overlay)app.appendChild(overlay);
    return;
  }

  const pk=S.phase,phase=PHASES[pk];
  app.appendChild(renderHdr(phase));
  const main=el("div",{id:"main"});

  if(S.tab==="plan"){
    main.appendChild(renderPlanTab(phase,pk));
  } else if(S.tab==="history"){
    main.appendChild(renderHistory(phase));
  } else if(S.tab==="progress"){
    main.appendChild(renderProgress(phase));
  }

  main.appendChild(dv({cls:"ss",style:{marginTop:"16px",fontSize:"9px",color:"#222",textAlign:"center"}},"Consult a physician before beginning a new exercise program. Adjust intensity based on how your body responds."));
  app.appendChild(main);
}

// ═══════════════════════════════════════════
// PWA SETUP
// ═══════════════════════════════════════════
function setupPWA(){
  // Manifest via blob URL
  const manifest={
    name:"16-Week Recomp",
    short_name:"Workout",
    start_url:"./workout-pwa.html",
    display:"standalone",
    background_color:"#0c0d10",
    theme_color:"#0c0d10",
    icons:[
      {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230c0d10'/><text y='.9em' font-size='90'>💪</text></svg>",sizes:"any",type:"image/svg+xml"}
    ]
  };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const link=document.createElement("link");
    link.rel="manifest";link.id="manifest-link";link.href=url;
    document.head.appendChild(link);
  }catch(e){}

  // Service worker via blob URL
  try{
    if("serviceWorker" in navigator){
      const swCode=`
        const CACHE='workout-pwa-v1';
        self.addEventListener('install',e=>{
          e.waitUntil(
            caches.open(CACHE).then(c=>c.addAll([self.location.href]))
          );
        });
        self.addEventListener('fetch',e=>{
          e.respondWith(
            caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
              const clone=res.clone();
              caches.open(CACHE).then(c=>c.put(e.request,clone));
              return res;
            }))
          );
        });
      `;
      const blob=new Blob([swCode],{type:"application/javascript"});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }
  }catch(e){}
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
load();
render();
setupPWA();
</script>
