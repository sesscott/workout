<style>

.f{display:flex}.fw{flex-wrap:wrap}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}

.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:7px}

.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}

.wf-rest-btns{display:flex;gap:10px;width:100%}
.wf-rest-btn{flex:1;height:48px;border:1px solid #22252e;border-radius:8px;background:#14161c;color:#aaa;font-family:'Courier New',Courier,monospace;font-size:12px;letter-spacing:.5px;cursor:pointer;transition:all .12s}
.wf-rest-btn:active{background:#1e2028;transform:scale(.97)}
.wf-log-box{background:#13151b;border:1px solid #1e2028;border-radius:10px;padding:16px}
.wf-log-title{font-family:Impact,'Arial Narrow',Arial,sans-serif;letter-spacing:2px;font-size:22px;color:#e8c547;margin-bottom:16px}
.wf-log-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.wf-log-exname{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:28px;font-weight:700;color:#fff;flex:1;line-height:1.2}
.wf-log-input{background:#0c0d10;border:1px solid #e8c547;color:#e8c547;border-radius:6px;padding:10px 12px;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:28px;width:130px;outline:none;text-align:center;letter-spacing:1px}

.wf-save-btn{width:100%;height:56px;background:#e8c547;color:#0c0d10;border-radius:8px;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:18px;letter-spacing:2px;border:none;cursor:pointer;margin-top:6px;-webkit-tap-highlight-color:transparent}
.wf-save-btn:active{transform:scale(.97);background:#d4b33e}
.wf-skip-log-btn{width:100%;padding:10px;color:#444;font-family:'Courier New',Courier,monospace;font-size:11px;text-align:center;border:none;background:none;cursor:pointer;min-height:44px}
.wf-done-box{background:#13151b;border:1px solid #1e2028;border-radius:10px;padding:20px 14px}

.wf-done-stat{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.wf-done-stc{background:#14161c;border:1px solid #22252e;border-radius:6px;padding:8px 12px;text-align:center;flex:1;min-width:80px}

.wf-done-exrow .pr{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:10px;color:#6cc97e;background:#6cc97e15;border:1px solid #6cc97e40;border-radius:3px;padding:1px 5px;letter-spacing:1px}
.wf-done-btns{display:flex;gap:10px;flex-wrap:wrap}

.wf-save-session-btn{background:#e8c547;color:#0c0d10}

.wf-stop-btn:active{color:#e05252;border-color:#e05252!important}
.wf-start-btn{width:100%;height:52px;background:#e8c547;color:#0c0d10;border-radius:8px;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:18px;letter-spacing:3px;border:none;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}
.wf-start-btn:active{transform:scale(.97);background:#d4b33e}
.wf-cardio-check{display:flex;align-items:center;gap:10px;padding:12px;background:#13151b;border:1px solid #1e2028;border-radius:8px;margin-bottom:8px;min-height:52px;cursor:pointer}

.hist-session{background:#13151b;border:1px solid #1e2028;border-radius:8px;margin-bottom:10px;overflow:hidden}
.hist-session-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;cursor:pointer;gap:8px;flex-wrap:wrap}

.exprog-section{background:#13151b;border:1px solid #1e2028;border-radius:8px;margin-bottom:10px;overflow:hidden}

/* GO flash when rest ends */
@keyframes goFlash{0%{color:#e8c547;transform:scale(1.08)}100%{color:#fff;transform:scale(1)}}
.wf-go-flash{animation:goFlash .6s ease-out forwards}
/* Warmup screen */
.wf-warmup-box{background:#13151b;border:1px solid #1e2028;border-radius:10px;padding:28px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}

<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const RPE=[
  {rpe:"6",  feel:"Could do 4+ more. Too easy — go heavier.",        c:"#6cc97e"},
  {rpe:"7",  feel:"Could do 3 more. Warm-up territory.",             c:"#a8d96c"},
  {rpe:"7.5",feel:"Could do 2–3 more. Getting there.",               c:"#c8d95c"},
  {rpe:"8",  feel:"Could do 2 more. Target zone. ✓",                 c:"#e8c547",target:true},
  {rpe:"8.5",feel:"Could do 1–2 more. Slightly above target.",       c:"#e8a847"},
  {rpe:"9",  feel:"Could do 1 more. Very hard — drop 5 lbs.",        c:"#e07b39"},
  {rpe:"10", feel:"Could not do another. Too heavy — drop 10 lbs.",  c:"#e05252"},
];

const TY={
  lift:  {bg:"#1a1f2e",ac:"#e8c547",lb:"STRENGTH"},
  cardio:{bg:"#0e1e1a",ac:"#6cc97e",lb:"PELOTON"},
  rest:  {bg:"#1a1520",ac:"#9b7fd4",lb:"REST"},
  deload:{bg:"#1a1520",ac:"#e05252",lb:"DELOAD"},
};

const WU_UPPER = "WARM-UP: 3 min dynamic (arm circles, shoulder rotations, thoracic rotations) + 2 sets DB External Rotation @ 5 lbs each arm (lie on side, rotate forearm up — rotator cuff prehab, non-negotiable at 42) + 2 warm-up sets on first exercise @ 50% working weight";
const WU_LOWER = "WARM-UP: 5 min easy Peloton spin + hip circles, leg swings, ankle rotations + 2 bodyweight goblet squats (deep, slow) before loading up";
const CD = "COOL-DOWN: 3–5 min static stretch — hold each position 30s";

// ─── SHARED PELOTON SESSIONS ─────────────
const pelo_z2 = (mins="35")=>({day:"Wednesday",label:"Core + Peloton Zone 2",type:"cardio",estTime:`~${parseInt(mins)+15} min`,ss:false,
  sessions:[
    {exercise:"Peloton Power Zone Endurance Ride",sets:1,reps:`${mins} min`,rest:"—",sw:"—",notes:"50–65% FTP. Conversational pace — you should be able to speak full sentences. Matt Wilpers PZE rides recommended."},
    {exercise:"Post-ride Stretch",sets:1,reps:"5 min",rest:"—",sw:"—",notes:"Hip flexors, quads, lower back. The bike tightens all three."},
  ]});

const pelo_hiit = {day:"Saturday",label:"Peloton — HIIT",type:"cardio",estTime:"~30 min",ss:false,
  sessions:[
    {exercise:"Warm-Up Spin",sets:1,reps:"8 min easy",rest:"—",sw:"—",notes:""},
    {exercise:"Intervals: 30s hard / 30s easy",sets:8,reps:"30s on / 30s off",rest:"—",sw:"—",notes:"85–90% max effort. Tabata or HIIT class. Total interval block ~16 min."},
    {exercise:"Cool-Down",sets:1,reps:"6 min",rest:"—",sw:"—",notes:"Easy spin to bring HR down."},
  ]};

const pelo_climb = {day:"Saturday",label:"Peloton — Climb Ride",type:"cardio",estTime:"~35 min",ss:false,
  sessions:[
    {exercise:"Peloton Climb Ride",sets:1,reps:"35 min",rest:"—",sw:"—",notes:"High resistance, low cadence (60–70 RPM). Simulates sustained hill work — excellent for lower body and fat oxidation."},
    {exercise:"Post-ride Plank",sets:3,reps:"45s",rest:"30s",sw:"BW",notes:"From bike straight to floor."},
  ]};

const rest_day = {day:"Sunday",label:"Full Rest",type:"rest",estTime:"—",ss:false,
  sessions:[
    {exercise:"Complete Rest",sets:0,reps:"—",rest:"—",sw:"—",notes:"34 lbs down since October. This day is earned. 7–9 hrs sleep is where muscle is built."},
    {exercise:"Optional: Peloton Scenic Ride or Walk",sets:1,reps:"20–30 min",rest:"—",sw:"—",notes:"Truly easy. No output targets."},
  ]};

// ─── CORE CIRCUITS ────────────────────────
const core_upperA = [
  {exercise:"Lying Leg Raise (on bench)",sets:2,reps:"12",rest:"30s, then into Hollow Hold",sw:"BW",superset:true,
   why:"Hip flexion and lower rectus abdominis. On the bench, a slight decline increases range. Keep lower back pressed down throughout — don't let it arch at the bottom.",
   tg:{start:"BW. Control the descent — don't let legs drop.",tooEasy:"12 controlled reps → add ankle weights or hold a light DB between feet",tooHard:"Bend knees slightly to reduce lever arm"}},
  {exercise:"Hollow Body Hold (Superset with above)",sets:2,reps:"30s hold",rest:"45s after pair",sw:"BW",superset:true,
   why:"Superior to standard plank for rectus abdominis. Trains anti-extension with the muscle in a lengthened position under sustained tension. Arms extended overhead = harder. Tuck arms at sides = easier.",
   tg:{start:"Arms by sides, knees slightly bent. Lower back must stay flat.",tooEasy:"Extend arms overhead; straighten legs",tooHard:"Bend knees more; arms stay at sides"}},
];
const core_upperB = [
  {exercise:"Bicycle Crunch",sets:2,reps:"20 total (10 each side)",rest:"30s, then into Hollow Hold",sw:"BW",superset:true,
   why:"One of the highest oblique + rectus abdominis activations available (Boeckh-Behrens EMG research). Trains both rotation AND flexion simultaneously. Slow is better — 2s per rep, full rotation, elbow to knee.",
   tg:{start:"BW. Slow deliberate reps — not a race.",tooEasy:"Hold a light DB at chest for added load",tooHard:"Reduce range of rotation; focus on control"}},

// AUDIO / HAPTICS / WAKE LOCK
// ═══════════════════════════════════════════
// Single AudioContext reused for entire session
let _audioCtx=null;

function _initAudioCtx(){
  if(_audioCtx)return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){console.warn('[audio] Web Audio API not supported');return;}
    _audioCtx=new AC();
    console.log('[audio] AudioContext created, state:',_audioCtx.state);
  }catch(e){console.error('[audio] failed to create AudioContext:',e);}
}

// Create + unlock on first user interaction (required by iOS and Safari)
function _unlockOnInteraction(){
  _initAudioCtx();
  if(_audioCtx&&_audioCtx.state!=='running'){
    _audioCtx.resume()
      .then(()=>console.log('[audio] unlocked via user gesture, state:',_audioCtx.state))
      .catch(e=>console.warn('[audio] resume error:',e));
  }
}
['click','touchstart','keydown'].forEach(ev=>{
  document.addEventListener(ev,_unlockOnInteraction,{capture:true,once:true});
});

function unlockAudio(){
  _initAudioCtx();
  if(_audioCtx&&_audioCtx.state!=='running'){
    _audioCtx.resume().catch(()=>{});
  }
}

// Tone: 440 Hz sine, gain 0→0.3 in 0.01s, hold 1.8s, 0.3→0 in 0.2s = 2.01s total
async function playTone(durationSec=2,freq=440){
  console.log('[audio] playTone() called — ctx state:',_audioCtx?_audioCtx.state:'null');
  _initAudioCtx();
  const ctx=_audioCtx;
  if(!ctx){console.warn('[audio] no AudioContext, aborting');return;}
  if(ctx.state!=='running'){
    console.log('[audio] resuming ctx (state:',ctx.state,')...');
    try{
      await ctx.resume();
      console.log('[audio] resumed, state now:',ctx.state);
    }catch(e){
      console.error('[audio] resume failed:',e);
      return;
    }
  }
  try{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.value=freq;
    const t=ctx.currentTime;
    // Envelope: attack 0.01s, sustain, release 0.2s
    const attack=0.01;
    const release=0.2;
    const sustain=Math.max(0,durationSec-attack-release);
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.3,t+attack);
    gain.gain.setValueAtTime(0.3,t+attack+sustain);
    gain.gain.linearRampToValueAtTime(0,t+attack+sustain+release);
    osc.start(t);
    osc.stop(t+durationSec);
    console.log('[audio] oscillator started at t='+t.toFixed(3)+' freq='+freq+'Hz dur='+durationSec+'s');
  }catch(e){
    console.error('[audio] tone generation error:',e);
  }
}
function beepDone(){playTone(2);}

// ── Screen Wake Lock ──────────────────────────────────────────────────────────
// _wakeLockDesired: true while a workout is active — drives re-request logic
let _wakeLock=null;
let _wakeLockDesired=false;

async function requestWakeLock(){
  _wakeLockDesired=true;
  if(!('wakeLock' in navigator))return; // API not supported — fail silently
  try{
    _wakeLock=await navigator.wakeLock.request('screen');
    // When the OS releases the lock (tab hidden, screen locked, etc.),
    // clear our handle; visibilitychange will re-request it when visible again.
    _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
  }catch(e){}
}

async function releaseWakeLock(){
  _wakeLockDesired=false; // signal: we no longer want the lock
  try{await _wakeLock?.release();}catch(e){}
  _wakeLock=null;
}

// Re-acquire the wake lock whenever the page comes back to the foreground
// (covers: iOS home-button, switching apps, screen auto-lock + unlock).
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible'&&_wakeLockDesired&&S.workout&&!_wakeLock){
    try{
      _wakeLock=await navigator.wakeLock?.request('screen');
      if(_wakeLock)_wakeLock.addEventListener('release',()=>{_wakeLock=null;});
    }catch(e){}
  }
});

function startRestTimer(seconds){
  clearInterval(_timerInterval);
  S.workout.restEnd=Date.now()+seconds*1000;
  S.workout.restTotal=seconds;
  _timerInterval=setInterval(async ()=>{
    const remaining=Math.ceil((S.workout.restEnd-Date.now())/1000);
    if(remaining<=0){
      clearInterval(_timerInterval);_timerInterval=null;
      await playTone(2); // await ensures tone starts before any DOM transition
      vibrate();
      advanceAfterRest();
      S.workout.goFlash=true;
      render();
    } else {
      // Update only timer DOM elements without full re-render
      const te=document.getElementById("wf-timer-text");
      const pb=document.getElementById("wf-prog-fill");
      if(te){
        const m=Math.floor(remaining/60);
        const s=remaining%60;
        te.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
      }
      if(pb){
        const total=S.workout.restTotal||60;
        const pct=((S.workout.restEnd-Date.now())/(total*1000))*100;
        pb.style.width=Math.max(0,Math.min(100,pct))+"%";
      }
    }
  },250);
}

function stopAllTimers(){
  clearInterval(_timerInterval);_timerInterval=null;
  clearInterval(_elapsedInterval);_elapsedInterval=null;
}

// ═══════════════════════════════════════════
// TIMED CORE EXERCISE FLOW (Wed/Sat core days)
// ═══════════════════════════════════════════
// Returns {name, secs} if the item has a timed part (reps like "30s" or "45s"), else null
function getTimedPart(item){
  for(const part of item.parts){
    const m=part.reps.match(/^(\d+)s$/);
    if(m)return {name:part.name,secs:parseInt(m[1])};
  }
  return null;
}

function startTransitionTimer(){
  clearInterval(_timerInterval);_timerInterval=null;
  _timerInterval=setInterval(async()=>{
    const w=S.workout;
    if(!w||w.phase!=="transition")return;
    const remaining=Math.max(0,Math.ceil((w.transitionEnd-Date.now())/1000));
    if(remaining<=0){
      clearInterval(_timerInterval);_timerInterval=null;
      await playTone(1);
      w.phase="timed";
      w.timedEnd=Date.now()+w.timedExercise.secs*1000;
      startTimedExerciseTimer();
      render();
    } else {
      const el=document.getElementById("wf-trans-count");
      if(el)el.textContent=fmtMSS(remaining);
    }
  },250);
}

function startTimedExerciseTimer(){
  clearInterval(_timerInterval);_timerInterval=null;
  _timerInterval=setInterval(async()=>{
    const w=S.workout;
    if(!w||w.phase!=="timed")return;
    const remaining=Math.max(0,Math.ceil((w.timedEnd-Date.now())/1000));
    if(remaining<=0){
      clearInterval(_timerInterval);_timerInterval=null;
      await playTone(2);
      vibrate();
      afterTimedExercise();
      render();
    } else {
      const el=document.getElementById("wf-timed-count");
      if(el)el.textContent=fmtMSS(remaining);
      const fill=document.getElementById("wf-timed-fill");
      if(fill){
        const pct=((w.timedEnd-Date.now())/(w.timedExercise.secs*1000))*100;
        fill.style.width=Math.max(0,Math.min(100,pct))+"%";
      }
    }
  },250);
}

function afterTimedExercise(){
  const w=S.workout;
  if(!w)return;
  const item=getCurrentItem();
  const isLastSet=w.timedIsLastSet;
  if(isLastSet){
    const isLastExercise=(w.qIdx===w.queue.length-1);
    if(isLastExercise){
      w.phase="done";
      stopAllTimers();
      releaseWakeLock();
    } else {
      w.restAdvancesQueue=true;
      w.phase="resting";
      startRestTimer(item.restSecs);
    }
  } else {
    w.setNum++;
    w.phase="resting";
    startRestTimer(item.restSecs);
  }
}

function startElapsedTimer(){
  clearInterval(_elapsedInterval);
  _elapsedInterval=setInterval(()=>{
    const el=document.getElementById("wf-elapsed");
    if(el&&S.workout){
      const mins=Math.floor((Date.now()-S.workout.startTime)/60000);
      el.textContent=mins+"m";
    }
  },60000);
}

const WU_UPPER_EXS=[
  {name:"Arm circles — forward",duration:30},
  {name:"Arm circles — backward",duration:30},
  {name:"Shoulder rolls",duration:30,switchAt:15,switchPrompt:"Switch direction"},

  {name:"Warmup Pushups",reps:"10–15 reps",note:"Bodyweight only. Controlled tempo — 2 seconds down, 1 second up. This primes the chest and triceps for pressing. Tap Complete when done.",repBased:true},
];
const WU_LOWER_EXS=[
  {name:"Hip circles",duration:30,switchAt:15,switchPrompt:"Switch direction"},
  {name:"Leg swings — front to back",duration:30,switchAt:15,switchPrompt:"Switch sides"},
  {name:"Leg swings — side to side",duration:30,switchAt:15,switchPrompt:"Switch sides"},
  {name:"Ankle rotations",duration:30,switchAt:15,switchPrompt:"Switch sides"},
  {name:"Bodyweight good morning",duration:30},
  {name:"Deep squat hold",duration:30},
];
const WU_CORE_EXS=[
  {name:"Cat-cow stretch",duration:30},
  {name:"Child's pose",duration:30},
  {name:"Supine knee hug",duration:30},
  {name:"Bird dog — slow",duration:30,switchAt:15,switchPrompt:"SWITCH SIDES"},
  {name:"Spinal twist stretch",duration:30,switchAt:15,switchPrompt:"SWITCH SIDES — drop knees to other side"},
  {name:"Hip flexor stretch",duration:30,switchAt:15,switchPrompt:"Switch sides"},

function getWarmupExercises(dayLabel){
  const lower=dayLabel.toLowerCase();
  if(lower.includes("lower"))return WU_LOWER_EXS;
  if(lower.includes("upper"))return WU_UPPER_EXS;
  if(lower.includes("core")||lower.includes("peloton"))return WU_CORE_EXS;
  return null;
}

function startWarmupStep(){
  const w=S.workout;
  if(!w||w.phase!=="warmup")return;
  const step=w.warmupExercises[w.warmupIdx];
  if(!step){
    w.phase="active";
    render();
    return;
  }
  w.warmupSwitchFired=false;
  w.warmupSwitchActive=false;
  clearInterval(_timerInterval);
  if(step.repBased){
    render();
    return;
  }
  w.warmupEnd=Date.now()+step.duration*1000;
  w.warmupTotal=step.duration;
  _timerInterval=setInterval(async ()=>{
    const remaining=Math.ceil((w.warmupEnd-Date.now())/1000);
    if(remaining<=0){
      clearInterval(_timerInterval);_timerInterval=null;
      await playTone(2); // await ensures tone starts before DOM transition
      w.warmupSwitchActive=false;
      w.warmupIdx++;
      if(w.warmupIdx>=w.warmupExercises.length){
        w.phase="active";
      } else {
        startWarmupStep();
      }
      render();
    } else {
      // Fire switch-sides tone+prompt at switchAt seconds remaining
      if(step.switchAt&&remaining===step.switchAt&&!w.warmupSwitchFired){
        w.warmupSwitchFired=true;
        w.warmupSwitchActive=true;
        await playTone(2); // await before showing switch prompt
        render(); // show switch prompt; subsequent ticks update DOM in place
        return;
      }
      // In-place DOM updates
      const te=document.getElementById("wf-wu-timer");
      const pb=document.getElementById("wf-wu-fill");
      if(te){
        te.textContent=fmtMSS(remaining);
        if(remaining<=5)te.classList.add("last5");
        else te.classList.remove("last5");
      }
      if(pb){
        const pct=((w.warmupEnd-Date.now())/(w.warmupTotal*1000))*100;
        pb.style.width=Math.max(0,Math.min(100,pct))+"%";
      }
    }
  },250);
}

// ═══════════════════════════════════════════
// LOG-PHASE REST TIMER (lifting days)
// ═══════════════════════════════════════════
function startLogTimer(secs){
  const w=S.workout;
  if(!w)return;
  clearInterval(_timerInterval);_timerInterval=null;
  w.logRestEnd=Date.now()+secs*1000;
  w.logRestTotal=secs;
  _timerInterval=setInterval(async ()=>{
    const remaining=Math.ceil((w.logRestEnd-Date.now())/1000);
    const te=document.getElementById("wf-log-timer");
    const pb=document.getElementById("wf-log-fill");
    if(remaining<=0){
      clearInterval(_timerInterval);_timerInterval=null;
      await playTone(2); // await ensures tone starts before any DOM transition
      vibrate();
      // save whatever is in inputs if not already manually saved
      if(!w._logSaved&&w._logInputs){
        const logMap={};
        Object.entries(w._logInputs).forEach(([name,inp])=>{
          if(inp.value.trim())logMap[name]=inp.value.trim();
        });
        commitLogWeights(logMap);
      }
      advanceToNextExercise();
      render();
    } else {
      if(te){
        te.textContent=fmtMSS(remaining);
        const col=remaining<=5?"#e05252":"#e8c547";
        te.style.color=col;
        if(te.parentElement)te.parentElement.style.borderColor=col;
      }
      if(pb){
        const pct=((w.logRestEnd-Date.now())/(w.logRestTotal*1000))*100;
        pb.style.width=Math.max(0,Math.min(100,pct))+"%";
        pb.style.background=remaining<=5?"#e05252":"#e8c547";
      }
    }
  },250);
}

// ═══════════════════════════════════════════
// REST TIME PARSER
// ═══════════════════════════════════════════
// Format seconds → "MM:SS"
function fmtMSS(secs){
  const s=Math.max(0,Math.round(secs));
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}

function parseRestTime(restStr){
  if(!restStr||restStr==="—")return 60;
  const s=restStr.toLowerCase();
  // "2.5 min" → 150
  const minMatch=s.match(/(\d+\.?\d*)\s*min/);
  if(minMatch)return Math.round(parseFloat(minMatch[1])*60);
  // "90s" → 90
  const secMatch=s.match(/(\d+)\s*s/);
  if(secMatch)return parseInt(secMatch[1]);
  return 60;
}

// ═══════════════════════════════════════════
// EXERCISE PARSER
// ═══════════════════════════════════════════
function parseExerciseEntry(sess){
  // Returns array of {name, reps, weight} parts
  const isSuperset = sess.name
    ? (sess.name.includes('(Superset)') || (sess.superset && sess.name.includes('+')))
    : (sess.exercise&&(sess.exercise.includes('(Superset)') || (sess.superset && sess.exercise.includes('+'))));

  const name = sess.name||sess.exercise||"";
  const repsStr = sess.reps||"";
  const swStr = sess.sw||"";

  if(!isSuperset){
    return [{name:name.replace(/\s*\(Superset\)/,"").trim(), reps:repsStr, weight:swStr}];
  }

  // Split name: remove (Superset) suffix, split on " + " or "+"
  const cleanName=name.replace(/\s*\(Superset\)\s*$/,"").trim();
  // Split on " + " first, then "+"
  let nameParts=cleanName.split(/\s*\+\s*/);
  let repsParts=repsStr.split(/\s*\+\s*/);
  let weightParts=swStr.split(/\s*\/\s*/);

  return nameParts.map((n,i)=>({
    name:n.trim(),
    reps:(repsParts[i]||repsParts[0]||"").trim(),
    weight:(weightParts[i]||weightParts[0]||swStr).trim(),
  }));
}

// ═══════════════════════════════════════════
// WORKOUT FLOW LOGIC
// ═══════════════════════════════════════════
function buildWorkoutQueue(sessions){
  // Build a flat list of "steps" for the workout
  // Each step: {sessionIdx, parts:[{name,reps,weight}], sets, restSecs, type:'exercise'}
  const queue=[];
  sessions.forEach((sess,si)=>{
    if(sess.sets<1)return; // skip sets=0
    if(sess.peloton)return; // Peloton ride handled in separate app
    const parts=parseExerciseEntry(sess);
    const restSecs=parseRestTime(sess.rest);
    queue.push({sessionIdx:si, parts, sets:sess.sets, restSecs, exercise:sess.exercise||sess.name||""});
  });
  return queue;
}

function startWorkout(dayObj, phaseKey, schedMode, bwMode, deloadMode, dayIdx){
  unlockAudio(); // must be called during user gesture so iOS AudioContext is ready
  const sessions=dayObj.sessions;
  const queue=buildWorkoutQueue(sessions);
  if(queue.length===0)return;

  const warmupExs=getWarmupExercises(dayObj.label);
  const hasWarmup=(dayObj.type==="lift"||dayObj.type==="deload")&&warmupExs!==null;
  const isCoreDay=dayObj.label.toLowerCase().includes("core");

  S.workout={
    dayLabel:dayObj.label,
    dayType:dayObj.type,
    phaseKey,schedMode,bwMode,deloadMode,dayIdx,
    queue,
    qIdx:0,
    setNum:1,
    partIdx:0,
    phase:hasWarmup?"warmup":"active",
    startTime:Date.now(),
    restEnd:null,
    restTotal:60,
    totalSets:0,
    loggedWeights:{},
    exerciseSets:{},
    cardioChecked:[],
    coreDay:isCoreDay,
    restAdvancesQueue:false,
    // warmup
    warmupExercises:warmupExs||[],
    warmupIdx:0,
    warmupEnd:null,
    warmupTotal:30,
    warmupSwitchFired:false,
    warmupSwitchActive:false,
    appleWatchDismissed:false,
  };

  // For cardio/rest days use checklist mode
  if(dayObj.type==="cardio"||dayObj.type==="rest"){
    S.workout.phase="cardio";
    S.workout.cardioChecked=sessions.map(()=>false);
  }

  // Auto-dismiss Apple Watch reminder after 5 seconds
  setTimeout(()=>{if(S.workout)S.workout.appleWatchDismissed=true;render();},5000);

  requestWakeLock();
  startElapsedTimer();
  render();
  // Kick off warmup timer after first render
  if(hasWarmup)startWarmupStep();
}

function stopWorkout(){
  stopAllTimers();
  releaseWakeLock();
  S.workout=null;
  render();
}

function getTotalSets(){
  if(!S.workout)return 0;
  return S.workout.queue.reduce((acc,q)=>acc+q.sets,0);
}

function getCurrentItem(){
  if(!S.workout)return null;
  return S.workout.queue[S.workout.qIdx]||null;
}

function getNextDescription(){
  const w=S.workout;
  if(!w)return "";
  const item=w.queue[w.qIdx];
  if(!item)return "";
  // restAdvancesQueue is true when the rest follows the LAST set of an exercise.
  // In that case the next thing to do is Set 1 of the next exercise.
  // Otherwise setNum has already been incremented to the upcoming set number.
  if(w.restAdvancesQueue){
    const nextItem=w.queue[w.qIdx+1];
    if(!nextItem)return "Session complete";
    const label=nextItem.parts.map(p=>p.name).join(" + ");
    return `Set 1 of ${nextItem.sets} — ${label}`;
  } else {
    // setNum was already incremented in completeCurrentPart; it IS the next set
    const label=item.parts.map(p=>p.name).join(" + ");
    return `Set ${w.setNum} of ${item.sets} — ${label}`;
  }
}

// Returns {item, setNum} for what comes after the current rest/log/warmup
function getNextInfo(w){
  if(!w)return null;
  if(w.phase==="warmup"){
    const item=w.queue[0]||null;
    return item?{item,setNum:1}:null;
  }
  if(w.phase==="resting"){
    if(w.restAdvancesQueue){
      const item=w.queue[w.qIdx+1]||null;
      return item?{item,setNum:1}:null;
    } else {
      const item=w.queue[w.qIdx]||null;
      return item?{item,setNum:w.setNum}:null;
    }
  }
  if(w.phase==="logging"){
    const item=w.queue[w.qIdx+1]||null;
    return item?{item,setNum:1}:null;
  }
  if(w.phase==="transition"||w.phase==="timed"){
    // After timed exercise: either next set of same item, or next item
    if(w.timedIsLastSet){
      const item=w.queue[w.qIdx+1]||null;
      return item?{item,setNum:1}:null;
    } else {
      const item=w.queue[w.qIdx]||null;
      return item?{item,setNum:(w.setNum+1)}:null;
    }
  }
  return null;
}

// Renders a "NEXT" exercise preview card into container — used on all timer screens
function renderNextPreview(container,w){
  const info=getNextInfo(w);
  if(!info)return;
  const {item,setNum}=info;

  const wrap=dv({style:{
    background:"#0e1013",border:"1px solid #2a2d36",borderRadius:"10px",
    padding:"14px 16px",
  }});

  wrap.appendChild(dv({style:{
    fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"13px",
    letterSpacing:"4px",color:"#e8c547",marginBottom:"12px",
    borderBottom:"1px solid #1e2028",paddingBottom:"8px",
  }},`NEXT: SET ${setNum} OF ${item.sets}`));

  item.parts.forEach((part,pi)=>{
    if(pi>0){
      wrap.appendChild(dv({style:{
        textAlign:"center",fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
        fontSize:"11px",letterSpacing:"4px",color:"#333",padding:"4px 0",
      }},"━━━ THEN ━━━"));
    }
    const progRaw=(part.weight&&part.weight!=="BW"&&part.weight!=="—")?part.weight:"";
    const progNum=progRaw?progRaw.match(/(\d+\.?\d*)/):null;
    const lastUsed=S.exerciseWeights[part.name];
    const rawWeight=progNum?progRaw:(lastUsed?lastUsed.weight:"");
    const numMatch=rawWeight?rawWeight.match(/(\d+\.?\d*)/):null;
    const wtNum=numMatch?numMatch[1]:"—";
    const showLbs=wtNum&&wtNum!=="—";

    // Name (bold, large)
    wrap.appendChild(dv({style:{
      fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif",
      fontSize:"32px",fontWeight:"700",color:"#fff",lineHeight:"1.2",marginBottom:"6px",
    }},part.name));
    const row=dv({style:{
      display:"grid",gridTemplateColumns:"1fr 1fr",
      gap:"8px",alignItems:"center",
    }});
    // LEFT: reps
    row.appendChild(dv({style:{
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
      fontSize:"56px",color:"#e8c547",letterSpacing:"1px",
      textAlign:"left",whiteSpace:"nowrap",lineHeight:"1",
    }},part.reps||"—"));
    // RIGHT: weight
    const wtRight=dv({style:{textAlign:"right",whiteSpace:"nowrap"}});
    wtRight.appendChild(dv({style:{
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
      fontSize:"56px",color:"#e8c547",letterSpacing:"1px",lineHeight:"1",
      fontWeight:"700",
    }},showLbs?wtNum+" lbs":"—"));
    row.appendChild(wtRight);
    wrap.appendChild(row);
  });

  container.appendChild(wrap);
}

function completeCurrentPart(){
  unlockAudio();
  const w=S.workout;
  if(!w)return;
  const item=getCurrentItem();
  if(!item)return;

  // Entire set (or superset round) is done in one button press
  w.partIdx=0;
  w.totalSets++;

  const isLastSet=(w.setNum>=item.sets);

  // Check for timed exercise (core days: Hollow Body Hold, Plank, etc.)
  const timedPart=w.coreDay?getTimedPart(item):null;
  if(timedPart){
    if(isLastSet)w.setNum=item.sets;
    w.timedExercise=timedPart;
    w.timedIsLastSet=isLastSet;
    w.phase="transition";
    w.transitionEnd=Date.now()+10000;
    startTransitionTimer();
    render();
    return;
  }

  if(isLastSet){
    w.setNum=item.sets;
    const isLastExercise=(w.qIdx===w.queue.length-1);
    if(w.coreDay){
      if(isLastExercise){
        // Last set of last exercise on core day — skip rest, go straight to summary
        w.phase="done";
        stopAllTimers();
        releaseWakeLock();
        render();
      } else {
        // More exercises remain — rest then advance
        w.restAdvancesQueue=true;
        w.phase="resting";
        startRestTimer(item.restSecs);
        render();
      }
    } else {
      // Lifting days: show log screen
      w.phase="logging";
      w._logSaved=false;
      if(isLastExercise){
        // Last exercise — no timer, just log and save goes straight to summary
        w.logRestSecs=0;
        render();
      } else {
        w.logRestSecs=item.restSecs;
        render();
        startLogTimer(item.restSecs);
      }
    }
  } else {
    w.setNum++;
    w.phase="resting";
    startRestTimer(item.restSecs);
    render();
  }
}

function advanceAfterRest(){
  const w=S.workout;
  if(!w)return;
  if(w.restAdvancesQueue){
    w.restAdvancesQueue=false;
    advanceToNextExercise();
  } else {
    w.phase="active";
    w.partIdx=0;
  }
}

function skipExercise(){
  const w=S.workout;
  if(!w)return;
  advanceToNextExercise();
  render();
}

function advanceToNextExercise(){
  const w=S.workout;
  if(!w)return;
  w.qIdx++;
  w.setNum=1;
  w.partIdx=0;
  if(w.qIdx>=w.queue.length){
    w.phase="done";
    stopAllTimers();
    releaseWakeLock();
  } else {
    w.phase="active";
  }
}

// Saves weights to workout state without advancing (used by log-timer flow)
function commitLogWeights(logMap){
  const w=S.workout;
  if(!w)return;
  const item=getCurrentItem();
  if(item){
    item.parts.forEach(p=>{
      if(logMap[p.name]){
        w.loggedWeights[p.name]=logMap[p.name];
        if(!w.exerciseSets)w.exerciseSets={};
        w.exerciseSets[p.name]=item.sets;
      }
    });
  }
  w._logSaved=true;
}

function saveLogAndContinue(logMap){
  commitLogWeights(logMap);
  advanceToNextExercise();
  render();
}

function skipLog(){
  advanceToNextExercise();
  render();
}

function saveSession(){
  const w=S.workout;
  if(!w)return;
  const duration=Math.round((Date.now()-w.startTime)/60000);
  const session={
    id:Date.now(),
    date:new Date().toISOString().split("T")[0],
    dayLabel:w.dayLabel,
    duration,
    totalSets:w.totalSets,
    weights:Object.assign({},w.loggedWeights),
    exerciseSets:Object.assign({},w.exerciseSets||{}),
    expanded:false,
  };
  S.history.unshift(session);
  saveH();
  // Update exerciseWeights
  const dateStr=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  Object.entries(w.loggedWeights).forEach(([name,weight])=>{
    S.exerciseWeights[name]={weight,date:dateStr};
  });
  saveXW();
  stopAllTimers();
  releaseWakeLock();
  S.workout=null;
  S.tab="history";
  render();
}

function estimatedVolume(){
  const w=S.workout;
  if(!w)return 0;
  let vol=0;
  Object.entries(w.loggedWeights).forEach(([name,wStr])=>{
    const match=wStr.match(/(\d+\.?\d*)/);
    if(match){
      const sets=w.exerciseSets?.[name]||3;
      vol+=parseFloat(match[1])*sets;
    }
  });
  return Math.round(vol);
}

// ═══════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════
function el(t,a={},...c){
  const e=document.createElement(t);
  Object.entries(a).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="cls")e.className=v;
    else e.setAttribute(k,v);
  });
  c.forEach(ch=>{
    if(ch==null)return;
    if(ch instanceof Node)e.appendChild(ch);
    else e.appendChild(document.createTextNode(String(ch)));
  });
  return e;
}
const dv=(a,...c)=>el("div",a,...c);
const sp=(a,...c)=>el("span",a,...c);
const bt=(a,...c)=>el("button",a,...c);
const ip=a=>el("input",a);

// ═══════════════════════════════════════════
// RENDER HEADER (plan mode)
// ═══════════════════════════════════════════
function renderHdr(phase){
  const h=el("div",{id:"hdr"});
  const inn=dv({cls:"inn"});

  inn.appendChild(dv({cls:"mb8"},
    dv({cls:"bb",style:{fontSize:"25px",color:"#fff",lineHeight:1}},"16-WEEK UPPER/LOWER RECOMP")
  ));

  // Main tabs + test tone button
  const tabs=dv({cls:"f g6 mb8",style:{alignItems:"center"}});
  [["PLAN","plan","#e8c547"],["HISTORY","history","#6cc97e"],["PROGRESS","progress","#6cc97e"]].forEach(([l,t,a])=>{
    const act=S.tab===t;
    tabs.appendChild(bt({cls:"tbtn ss",style:{background:act?a:"#14161c",color:act?"#0c0d10":"#666",border:act?"none":"1px solid #22252e",fontWeight:600},onClick:()=>set({tab:t})},l));
  });
  // Small audio test button — tap to confirm tones are working before a workout
  tabs.appendChild(bt({cls:"mm",style:{
    marginLeft:"auto",border:"1px solid #2a2d36",borderRadius:"4px",
    padding:"5px 10px",fontSize:"11px",color:"#555",background:"none",letterSpacing:".5px",
  },onClick:(e)=>{
    e.stopPropagation();
    unlockAudio();
    playTone(2,440);
    const b=e.currentTarget;
    const orig=b.textContent;
    b.textContent="♪ playing…";b.style.color="#e8c547";
    setTimeout(()=>{b.textContent=orig;b.style.color="#555";},2200);
  }},"♪ TEST TONE"));
  inn.appendChild(tabs);

  inn.appendChild(dv({cls:"ibox mb8",style:{borderLeft:`3px solid ${phase.color}`}},
    sp({cls:"ss",style:{fontSize:"14px",color:"#bbb"}},
      sp({style:{color:phase.color,fontWeight:600}},"HOW IT WORKS: "),
      "Browse the program below and tap START WORKOUT to begin a guided session. Use ",
      sp({style:{color:"#e8c547"}},"+ LOG WEIGHT")," in plan view to save planned weights."
    )
  ));

  inn.appendChild(bt({cls:"rpebtn mm",style:{background:S.showRpe?"#e8c547":"#14161c",color:S.showRpe?"#0c0d10":"#666"},
    onClick:()=>set({showRpe:!S.showRpe})},S.showRpe?"▲ HIDE RPE SCALE":"▼ RPE SCALE — HOW HARD SHOULD IT FEEL?"));
  if(S.showRpe){
    const rs=dv({cls:"fade",style:{background:"#13151b",border:"1px solid #1e2028",borderRadius:"6px",overflow:"hidden",marginTop:"7px"}});
    RPE.forEach(r=>{
      const row=dv({style:{display:"flex",alignItems:"center",gap:"11px",padding:"7px 13px",borderBottom:"1px solid #111"}},
        dv({cls:"bb",style:{fontSize:"17px",color:r.c,width:"30px",flexShrink:0}},r.rpe),
        dv({cls:"ss",style:{fontSize:"11px",color:"#aaa"}},r.feel)
      );
      if(r.target)row.appendChild(dv({style:{marginLeft:"auto",background:"#e8c54720",border:"1px solid #e8c54750",borderRadius:"3px",padding:"2px 6px",fontFamily:"'Courier New',Courier,monospace",fontSize:"8px",color:"#e8c547"}},"TARGET"));
      rs.appendChild(row);
    });
    inn.appendChild(rs);
  }
  h.appendChild(inn);
  return h;
}

// ═══════════════════════════════════════════
// RENDER PLAN TAB
// ═══════════════════════════════════════════
function renderPlanTab(phase,pk){
  const f=document.createDocumentFragment();
  const pNum=phase.num;

  const pt=dv({cls:"f fw g6 mb10"});
  PK.forEach(k=>{
    const p=PHASES[k],act=k===pk;
    pt.appendChild(bt({cls:"pbtn bb",style:{background:act?p.color:"#14161c",color:act?"#0c0d10":"#666",border:act?"none":"1px solid #22252e"},
      onClick:()=>set({phase:k,dayIdx:0,expandedRow:null,deload:false,bw:false})},
      p.name.toUpperCase()+"\n"+p.weeks));
  });
  f.appendChild(pt);

  const mc=dv({cls:"f fw g6 mb8 ac"});
  mc.appendChild(sp({cls:"mm",style:{fontSize:"13px",color:"#555",marginRight:"3px"}},"SCHEDULE:"));
  [["MON–SAT (STANDARD)","std"],["MON–FRI ONLY","mf"]].forEach(([l,v])=>{
    const act=S.sched===v;
    mc.appendChild(bt({cls:"sbtn mm",style:{background:act?"#e8c547":"#14161c",color:act?"#0c0d10":"#666",border:act?"none":"1px solid #22252e"},
      onClick:()=>set({sched:v,dayIdx:0,expandedRow:null})},l));
  });
  if(pNum===1){
    mc.appendChild(sp({cls:"mm",style:{fontSize:"13px",color:"#333",margin:"0 4px"}},"·"));
    const act=S.bw;
    mc.appendChild(bt({cls:"sbtn mm",style:{background:act?"#9b7fd4":"#14161c",color:act?"#fff":"#666",border:act?"none":"1px solid #22252e"},
      onClick:()=>set({bw:!S.bw,dayIdx:0,expandedRow:null,deload:false})},act?"✓ TRAVEL WEEK (BW)":"TRAVEL WEEK MODE"));
  }
  if(pNum===2||pNum===3){
    mc.appendChild(sp({cls:"mm",style:{fontSize:"13px",color:"#333",margin:"0 4px"}},"·"));
    const wkLabel=pNum===2?"WEEK 8 DELOAD":"WEEK 12 DELOAD";
    const act=S.deload;
    mc.appendChild(bt({cls:"sbtn mm",style:{background:act?"#e05252":"#14161c",color:act?"#fff":"#666",border:act?"none":"1px solid #22252e"},
      onClick:()=>set({deload:!S.deload,dayIdx:0,expandedRow:null,bw:false})},act?"✓ "+wkLabel:wkLabel));
  }
  f.appendChild(mc);

  if(S.deload){
    const d=dv({cls:"ibox ss fade mb10",style:{borderLeft:"3px solid #e05252",fontSize:"14px",color:"#bbb",lineHeight:"1.6"}});
    d.appendChild(sp({style:{color:"#e05252",fontWeight:600}},"DELOAD WEEK: "));
    d.appendChild(document.createTextNode("Same exercises, same weight, 2 sets per exercise only. This is not optional — it's when supercompensation happens. Performance rebounds ABOVE pre-deload levels after a proper deload. Resist the urge to add sets."));
    f.appendChild(d);
  } else if(pNum===1&&S.bw){
    f.appendChild(dv({cls:"ibox ss fade mb10",style:{borderLeft:"3px solid #9b7fd4",fontSize:"14px",color:"#bbb",lineHeight:"1.6"}},
      sp({style:{color:"#9b7fd4",fontWeight:600}},"TRAVEL WEEK (APRIL 13): "),
      "All exercises swapped for hotel-room bodyweight versions. A backpack with 10–15 lbs of books dramatically upgrades this week. One week of BW training will not set you back — it may actually improve Week 4 performance."
    ));
  } else {
    f.appendChild(dv({cls:"ibox ss fade mb10",style:{borderLeft:`3px solid ${phase.color}`,fontSize:"14px",color:"#bbb",lineHeight:"1.6"}},
      sp({style:{color:phase.color,fontWeight:600}},"PHASE GOAL: "),phase.goal));
  }

  const schedule = S.deload ? buildDeloadSchedule(S.sched) : buildSchedule(pNum, S.sched, pNum===1&&S.bw);
  const safeIdx = Math.min(S.dayIdx, schedule.length-1);
  const day = schedule[safeIdx];
  const ts = TY[day.type]||TY.lift;

  const dt=dv({cls:"f fw g6 mb14"});
  schedule.forEach((dy,i)=>{
    const act=i===safeIdx;
    const tc=TY[dy.type]||TY.lift;
    dt.appendChild(bt({cls:"dbtn mm",style:{background:act?tc.ac:"#14161c",color:act?"#0c0d10":"#555",border:act?"none":"1px solid #1e2028"},
      onClick:()=>set({dayIdx:i,expandedRow:null})},
      dy.day.slice(0,3).toUpperCase()+"\n"+(tc.lb||"").slice(0,3)));
  });
  f.appendChild(dt);

  const card=dv({cls:"card fade",style:{background:ts.bg,border:`1px solid ${ts.ac}20`,borderTop:`3px solid ${ts.ac}`}});

  // Day header with START WORKOUT button
  const dhdr=dv({style:{padding:"12px",borderBottom:"1px solid #1e2028",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"7px"}});
  dhdr.appendChild(dv({},
    dv({cls:"bb",style:{fontSize:"22px",color:"#fff",letterSpacing:"2px"}},day.day+" — "+day.label),
    dv({cls:"ss",style:{fontSize:"13px",color:ts.ac,letterSpacing:"1.5px",marginTop:"2px"}},
      (ts.lb||"")+" · "+day.sessions.filter(x=>x.sets>0).length+" EXERCISES")
  ));
  const dhdrRight=dv({style:{display:"flex",gap:"7px",alignItems:"center"}});
  if(day.estTime&&day.estTime!=="—"){
    dhdrRight.appendChild(dv({style:{background:`${ts.ac}18`,border:`1px solid ${ts.ac}40`,borderRadius:"4px",padding:"3px 8px",fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"13px",color:ts.ac,letterSpacing:"1px"}},"⏱ "+day.estTime));
  }
  dhdrRight.appendChild(dv({cls:"mm",style:{fontSize:"11px",color:"#444",border:"1px solid #1e2028",borderRadius:"3px",padding:"4px 9px"}},phase.weeks));
  dhdr.appendChild(dhdrRight);
  card.appendChild(dhdr);

  // START WORKOUT button
  const swBtn=bt({cls:"wf-start-btn",style:{borderRadius:"0",marginTop:"0",borderBottom:"1px solid #1e2028"},
    onClick:()=>startWorkout(day,pk,S.sched,S.bw,S.deload,safeIdx)},
    "► START WORKOUT");
  card.appendChild(swBtn);

  if(day.why){
    card.appendChild(dv({style:{padding:"8px 12px",borderBottom:"1px solid #1e2028",background:"rgba(255,255,255,.015)"}},
      sp({cls:"ss",style:{fontSize:"11px",color:"#4a4d56"}},sp({style:{color:"#3d4050"}},"SESSION: "),day.why)
    ));
  }

  if(day.type==="lift"||day.type==="deload"){
    const isLower=day.label.includes("Lower")||day.label.includes("Leg");
    card.appendChild(dv({style:{padding:"7px 12px",borderBottom:"1px solid #1e2028",background:"rgba(255,255,255,.02)"}},
      sp({cls:"ss",style:{fontSize:"10px",color:"#555"}},isLower?WU_LOWER:WU_UPPER)
    ));
  }

  card.appendChild(dv({style:{display:"grid",gridTemplateColumns:"1.9fr .4fr .8fr .95fr .55fr",padding:"9px 12px",background:"rgba(255,255,255,.05)",borderBottom:"1px solid #1e2028"}},
    ...["EXERCISE","SETS","REPS","WEIGHT","REST"].map(h=>dv({cls:"mm",style:{fontSize:"11px",color:"#555",letterSpacing:"1.5px"}},h))
  ));

  day.sessions.forEach((sess,i)=>{
    const wk=`${pk}-${S.sched}-${S.bw?'bw':'std'}-${S.deload?'dl':'wd'}-${safeIdx}-${i}`;
    const logged=S.weights[wk];
    const isEd=S.editKey===wk;
    const isExp=S.expandedRow===i;
    const hasTip=!!(sess.tg||sess.why||sess.notes);

    const row=bt({cls:"rbtn",style:{gridTemplateColumns:"1.9fr .4fr .8fr .95fr .55fr",background:i%2===0?"transparent":"rgba(255,255,255,.018)"},
      onClick:()=>set({expandedRow:isExp?null:i})});

    const nm=dv({cls:"ss",style:{fontSize:"15px",color:"#ddd",paddingRight:"5px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:"4px"}},
      sp({},sess.exercise));
    if(sess.superset)nm.appendChild(sp({cls:"ssbadge"},"SS"));
    if(hasTip)nm.appendChild(sp({style:{fontSize:"11px",color:ts.ac,opacity:".5"}},"▾"));
    row.appendChild(nm);

    row.appendChild(dv({cls:"bb",style:{fontSize:"18px",color:sess.sets>0?ts.ac:"#444",letterSpacing:"1px",alignSelf:"center"}},sess.sets>0?String(sess.sets):"—"));
    row.appendChild(dv({cls:"mm",style:{fontSize:"13px",color:"#ccc",alignSelf:"center"}},sess.reps));

    const wc=dv({style:{alignSelf:"center"}});
    wc.addEventListener("click",e=>e.stopPropagation());
    const sw=sess.sw||"";
    if(sess.tg){
      if(isEd){
        const fi=ip({cls:"wi",placeholder:"e.g. 25 lbs",value:S.editVal});
        fi.addEventListener("input",e=>{S.editVal=e.target.value;});
        fi.addEventListener("keydown",e=>{
          if(e.key==="Enter"){S.weights[wk]=S.editVal;saveW();set({editKey:null});}
          if(e.key==="Escape")set({editKey:null});
        });
        wc.appendChild(dv({style:{display:"flex",alignItems:"center"}},fi,
          bt({cls:"wsbtn",onClick:()=>{S.weights[wk]=S.editVal;saveW();set({editKey:null});}},"✓")));
        setTimeout(()=>fi.focus(),30);
      } else if(logged){
        wc.appendChild(dv({style:{display:"flex",alignItems:"center",gap:"4px"}},
          sp({style:{fontFamily:"'Courier New',Courier,monospace",fontSize:"13px",color:"#0c0d10",background:ts.ac,padding:"3px 7px",borderRadius:"3px",fontWeight:700}},logged),
          bt({cls:"webtn",onClick:()=>set({editKey:wk,editVal:logged})},"edit")
        ));
      } else {
        wc.appendChild(dv({style:{display:"flex",flexDirection:"column",gap:"3px"}},
          sw&&sw!=="—"&&sw!=="BW"?dv({style:{display:"flex",alignItems:"center",gap:"3px"}},sp({cls:"sbadge"},"→ "+sw)):
          sw==="BW"?sp({cls:"bwbadge"},"BW"):null,
          bt({cls:"webtn",onClick:()=>set({editKey:wk,editVal:sw&&sw!=="BW"&&sw!=="—"?sw:"",expandedRow:i})},"+ LOG WEIGHT")
        ));
      }
    } else {
      wc.appendChild(sw&&sw!=="—"?sp({cls:sw==="BW"?"bwbadge":"sbadge"},sw==="BW"?"BODYWEIGHT":sw):sp({cls:"mm",style:{fontSize:"13px",color:"#444"}},"—"));
    }
    row.appendChild(wc);
    row.appendChild(dv({cls:"mm",style:{fontSize:"13px",color:"#666",alignSelf:"center"}},sess.rest));
    card.appendChild(row);

    if(isExp&&hasTip){
      const panel=dv({cls:"fade",style:{padding:"11px 12px 13px",background:`${ts.ac}0c`,borderBottom:"1px solid #1a1c23"}});
      if(sess.why){
        panel.appendChild(dv({style:{marginBottom:sess.tg?"9px":"0"}},
          dv({cls:"mm mb4",style:{fontSize:"8px",color:ts.ac,letterSpacing:"1.5px"}},"WHY THIS EXERCISE"),
          dv({cls:"ss",style:{fontSize:"11px",color:"#aaa",lineHeight:"1.65"}},sess.why)
        ));
      }
      if(sess.tg){
        panel.appendChild(dv({cls:"mm",style:{fontSize:"8px",color:ts.ac,letterSpacing:"1.5px",marginBottom:"6px"}},"SELF-TEST PROTOCOL"));
        const gr=dv({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:"6px",marginBottom:sess.notes?"9px":"0"}});
        [{l:"▶ START WITH",c:"#6cc97e",t:sess.tg.start},{l:"✓ TOO EASY",c:"#6cc97e",t:sess.tg.tooEasy},{l:"✗ TOO HEAVY",c:"#e05252",t:sess.tg.tooHard}].forEach(x=>{
          gr.appendChild(dv({cls:"tcard"},
            dv({cls:"mm",style:{fontSize:"8px",color:x.c,letterSpacing:"1px",marginBottom:"3px"}},x.l),
            dv({cls:"ss",style:{fontSize:"11px",color:"#bbb"}},x.t)
          ));
        });
        panel.appendChild(gr);
      }
      if(sess.notes)panel.appendChild(dv({cls:"ss",style:{fontSize:"11px",color:"#bbb",lineHeight:"1.6"}},sp({style:{color:ts.ac,marginRight:"4px"}},"💡"),sess.notes));
      card.appendChild(panel);
    }
  });

  const ft=dv({style:{padding:"9px 12px",borderTop:"1px solid #1e2028",background:"rgba(255,255,255,.02)",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"7px"}});
  if(day.type==="lift"||day.type==="deload"){
    ft.appendChild(dv({cls:"ss",style:{fontSize:"10px",color:"#555"}},sp({style:{color:"#777"}},"COOL-DOWN: "),CD));
  } else if(day.type==="cardio"){
    ft.appendChild(sp({cls:"ss",style:{fontSize:"10px",color:"#555"}},sp({style:{color:"#777"}},"HYDRATION: "),"20+ oz water per 30 min · electrolytes on long rides"));
  } else {
    ft.appendChild(sp({cls:"ss",style:{fontSize:"10px",color:"#555"}},sp({style:{color:"#777"}},"PRIORITY: "),"7–9 hrs sleep · protein target · daily 20–30 min walk"));
  }
  ft.appendChild(sp({cls:"ss",style:{fontSize:"9px",color:"#2a2d36"}},"Tap exercise for rationale + self-test ▾"));
  card.appendChild(ft);
  f.appendChild(card);

  if(pNum>=3&&!S.deload){
    f.appendChild(dv({cls:"ibox mt10",style:{borderLeft:"3px solid #6cc97e"}},
      dv({cls:"ss",style:{fontSize:"11px",color:"#777",lineHeight:"1.7"}},
        sp({style:{color:"#6cc97e",fontWeight:600}},"PHASE "+pNum+" FAT LOSS NOTES: "),
        "20–30 min walks daily (outside of sessions) meaningfully increase weekly calorie burn without affecting recovery — free fat loss. ",
        pNum===3?"Also: recalculate your TDEE at Week 9. Every ~10 lbs lost reduces maintenance by ~100–150 kcal — reset the deficit.":"Protein stays at 190g regardless of calorie adjustments.",
        " Wednesday Peloton = Zone 2 ONLY (not HIIT) — it sits between two heavy lifting days."
      )
    ));
  }

  f.appendChild(dv({style:{marginTop:"16px"}},
    dv({cls:"bb",style:{fontSize:"13px",letterSpacing:"3px",color:"#444",marginBottom:"9px"}},"PROGRAM MILESTONES"),
    dv({cls:"gas"},...MS.map(m=>{
      const isDl=m.note.includes("DELOAD");
      return dv({cls:"msc",style:{borderLeft:isDl?"3px solid #e05252":"1px solid #1e2028"}},
        dv({cls:"bb",style:{fontSize:"13px",color:isDl?"#e05252":phase.color,letterSpacing:"1.5px"}},m.wk),
        dv({cls:"ss",style:{fontSize:"13px",color:isDl?"#aaa":"#666",marginTop:"2px",lineHeight:"1.5"}},m.note)
      );
    }))
  ));

  return f;
}

// ═══════════════════════════════════════════
// RENDER WORKOUT FLOW OVERLAY
// ═══════════════════════════════════════════
function renderWorkoutOverlay(){
  const w=S.workout;
  if(!w)return null;

  const overlay=dv({id:"wf-overlay"});

  // Header
  const mins=Math.floor((Date.now()-w.startTime)/60000);
  const totalSetsAll=getTotalSets();
  const hdr=dv({id:"wf-header"});
  hdr.appendChild(bt({cls:"wf-stop-btn",onClick:()=>{if(confirm("Stop workout? Progress will be lost."))stopWorkout();}},"← STOP"));

  const item=getCurrentItem();
  const hdrCenter=dv({style:{flex:1,textAlign:"center",minWidth:0,overflow:"hidden"}});
  if(w.phase==="warmup"){
    hdrCenter.appendChild(dv({cls:"wf-label"},w.dayLabel.toUpperCase()));
    hdrCenter.appendChild(dv({cls:"wf-set-counter"},"WARM-UP · "+(w.warmupIdx+1)+"/"+w.warmupExercises.length));
  } else if(item&&w.phase!=="done"){
    hdrCenter.appendChild(dv({cls:"wf-label"},w.dayLabel.toUpperCase()));
    hdrCenter.appendChild(dv({cls:"wf-set-counter"},`SET ${w.setNum}/${item.sets} · EX ${w.qIdx+1}/${w.queue.length}`));
  } else if(w.phase==="done"){
    hdrCenter.appendChild(dv({cls:"wf-label"},"WORKOUT COMPLETE"));
  }
  hdr.appendChild(hdrCenter);
  hdr.appendChild(dv({id:"wf-elapsed",cls:"mm"},mins+"m"));
  overlay.appendChild(hdr);

  const body=dv({id:"wf-body"});

  if(w.phase==="warmup"){
    renderWarmupPhase(body,w);
  } else if(w.phase==="cardio"){
    renderCardioMode(body,w);
  } else if(w.phase==="active"){
    renderActivePhase(body,w,item);
  } else if(w.phase==="resting"){
    renderRestPhase(body,w,item);
  } else if(w.phase==="logging"){
    renderLoggingPhase(body,w,item);
  } else if(w.phase==="transition"){
    renderTransitionPhase(body,w);
  } else if(w.phase==="timed"){
    renderTimedPhase(body,w);
  } else if(w.phase==="done"){
    renderDonePhase(body,w);
  }

  overlay.appendChild(body);
  return overlay;
}

function renderWarmupPhase(body,w){
  const step=w.warmupExercises[w.warmupIdx]||{name:"",duration:30};

  // ── Apple Watch reminder banner ─────────────────────────────
  if(!w.appleWatchDismissed){
    const banner=dv({style:{
      background:"#1a1f2e",border:"1px solid #3a4a7a",borderRadius:"10px",
      padding:"12px 14px",marginBottom:"10px",
      display:"flex",alignItems:"center",gap:"10px",
    }});
    banner.appendChild(dv({style:{fontSize:"24px",flexShrink:0}},"⌚"));
    banner.appendChild(dv({style:{
      flex:"1",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
      fontSize:"15px",color:"#c8d4f0",lineHeight:"1.4",
    }},"Don't forget to start a workout in Apple Fitness on your Apple Watch."));
    banner.appendChild(bt({style:{
      background:"none",border:"1px solid #3a4a7a",borderRadius:"6px",
      color:"#7a9fd4",fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
      fontSize:"11px",letterSpacing:"2px",padding:"6px 10px",
      cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",
    },onClick:()=>{w.appleWatchDismissed=true;render();}},"GOT IT"));
    body.appendChild(banner);
  }

  // Mini exercise list — shared between timed and rep-based views
  const list=dv({style:{width:"100%",display:"flex",flexDirection:"column",gap:"10px",marginTop:"8px"}});
  w.warmupExercises.forEach((ex,i)=>{
    const isCurrent=i===w.warmupIdx;
    const isDone=i<w.warmupIdx;
    list.appendChild(dv({style:{
      display:"flex",alignItems:"center",gap:"16px",padding:"10px 14px",
      borderRadius:"6px",
      background:isCurrent?"#9b7fd418":"transparent",
      border:isCurrent?"1px solid #9b7fd440":"1px solid transparent",
      opacity:isDone?".3":"1",
    }},
      dv({style:{
        width:"36px",height:"36px",borderRadius:"50%",flexShrink:0,
        background:isDone?"#9b7fd4":isCurrent?"#9b7fd4":"#1e2028",
        border:isDone?"none":isCurrent?"none":"1px solid #333",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:"18px",color:"#0c0d10",fontFamily:"Impact,sans-serif",
      }},isDone?"✓":isCurrent?"▶":""),
      dv({cls:"ss",style:{fontSize:"54px",color:isCurrent?"#fff":isDone?"#555":"#777"}},ex.name),
      dv({cls:"mm",style:{marginLeft:"auto",fontSize:"42px",color:isCurrent?"#9b7fd4":"#444",whiteSpace:"nowrap"}},
        ex.repBased?(ex.reps||"reps"):ex.duration+"s")
    ));
  });

  const skipBtn=bt({cls:"wf-skip-btn",onClick:()=>{
    clearInterval(_timerInterval);_timerInterval=null;
    w.phase="active";
    render();
  }},"SKIP WARMUP");

  // ── Rep-based warmup step (e.g., pushups) ──────────────────
  if(step.repBased){
    body.appendChild(dv({style:{textAlign:"center",marginBottom:"6px"}},
      dv({cls:"wf-label",style:{color:"#9b7fd4"}},"WARM-UP — PRESSING PRIMER")
    ));
    const box=dv({cls:"wf-warmup-box"});
    box.appendChild(dv({cls:"wf-warmup-exname"},step.name));
    box.appendChild(dv({style:{
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"36px",
      color:"#e8c547",letterSpacing:"2px",
    }},step.reps||""));
    if(step.note){
      box.appendChild(dv({style:{
        fontFamily:"'Courier New',Courier,monospace",fontSize:"14px",
        color:"#777",lineHeight:"1.6",maxWidth:"340px",
      }},step.note));
    }
    box.appendChild(list);
    body.appendChild(box);
    body.appendChild(bt({cls:"wf-complete-btn",onClick:()=>{
      w.warmupIdx++;
      if(w.warmupIdx>=w.warmupExercises.length){w.phase="active";}
      else{startWarmupStep();}
      render();
    }},"COMPLETE"));
    body.appendChild(skipBtn);
    renderNextPreview(body,w);
    return;
  }

  // ── Timed warmup step ──────────────────────────────────────
  const remaining=Math.max(0,Math.ceil((w.warmupEnd-Date.now())/1000));
  const pct=w.warmupEnd?((w.warmupEnd-Date.now())/(w.warmupTotal*1000))*100:100;

  body.appendChild(dv({style:{textAlign:"center",marginBottom:"6px"}},
    dv({cls:"wf-label",style:{color:"#9b7fd4"}},"3-MINUTE WARM-UP — AUTO-CYCLING")
  ));

  const box=dv({cls:"wf-warmup-box"});
  box.appendChild(dv({id:"wf-wu-name",cls:"wf-warmup-exname"},step.name));

  if(w.warmupSwitchActive){
    box.appendChild(dv({id:"wf-wu-switch",style:{
      background:"#e8c54730",border:"2px solid #e8c547",borderRadius:"8px",
      padding:"10px 16px",textAlign:"center",margin:"6px 0",
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"36px",
      letterSpacing:"3px",color:"#e8c547",
    }},step.switchPrompt||"SWITCH SIDES"));
  } else {
    box.appendChild(dv({id:"wf-wu-switch",style:{display:"none"}}));
  }

  box.appendChild(dv({id:"wf-wu-timer",cls:"wf-warmup-count"+(remaining<=5?" last5":"")},fmtMSS(remaining)));

  const pb=dv({cls:"wf-prog-bar",style:{width:"100%"}});
  pb.appendChild(dv({id:"wf-wu-fill",cls:"wf-prog-fill",style:{width:Math.max(0,Math.min(100,pct))+"%",background:"#9b7fd4"}}));
  box.appendChild(pb);
  box.appendChild(list);
  body.appendChild(box);

  body.appendChild(skipBtn);
  // Show first exercise coming up after warmup
  renderNextPreview(body,w);
}

function renderCardioMode(body,w){
  body.appendChild(dv({cls:"wf-label",style:{marginBottom:"8px"}},w.dayLabel.toUpperCase()+" — CHECKLIST"));
  w.queue.forEach((item,i)=>{
    const checked=w.cardioChecked[i]||false;
    const row=dv({cls:"wf-cardio-check"});
    const cb=ip({type:"checkbox"});
    cb.checked=checked;
    cb.addEventListener("change",()=>{
      w.cardioChecked[i]=cb.checked;
      if(w.cardioChecked.every(Boolean)){
        w.phase="done";
        stopAllTimers();
        releaseWakeLock();
        render();
      } else {
        // just update
        cb.checked=w.cardioChecked[i];
      }
    });
    row.appendChild(cb);
    const label=dv({});
    label.appendChild(dv({cls:"wf-exname",style:{fontSize:"15px",marginBottom:"2px"}},item.parts[0]&&item.parts[0].name||item.exercise));
    const q=w.queue[i];
    if(q&&q.parts&&q.parts[0]){
      label.appendChild(dv({cls:"wf-exdim"},q.parts[0].reps));
    }
    row.appendChild(label);
    body.appendChild(row);
  });
  // done button
  body.appendChild(bt({cls:"wf-complete-btn",style:{marginTop:"auto"},
    onClick:()=>{
      w.phase="done";
      stopAllTimers();
      releaseWakeLock();
      render();
    }},"MARK COMPLETE"));
}

function renderActivePhase(body,w,item){
  if(!item){
    w.phase="done";
    stopAllTimers();
    releaseWakeLock();
    render();
    return;
  }

  const isSuperset=item.parts.length>1;
  const doFlash=w.goFlash;
  if(doFlash)w.goFlash=false;

  // GO flash banner when transitioning from rest
  if(doFlash){
    const goBar=dv({style:{background:"#e8c54718",border:"1px solid #e8c54740",borderRadius:"8px",padding:"10px",textAlign:"center",marginBottom:"6px"}},
      dv({cls:"bb wf-go-flash",style:{fontSize:"28px",color:"#e8c547",letterSpacing:"4px"}},"GO!"),
      dv({cls:"mm",style:{fontSize:"10px",color:"#666",marginTop:"2px"}},`REST DONE — START SET ${w.setNum}`)
    );
    body.appendChild(goBar);
  }

  // Set counter
  body.appendChild(dv({style:{textAlign:"center",marginBottom:"6px"}},
    dv({cls:"wf-label"},"SET "+w.setNum+" OF "+item.sets)
  ));

  // Build one horizontal card per exercise part
  function makeExCard(part, label){
    const lastUsed=S.exerciseWeights[part.name];
    const rawWt=part.weight||"";
    const numMatch=rawWt.match(/(\d+\.?\d*)/);
    const wtNum=numMatch?numMatch[1]:(rawWt==="BW"?"BW":rawWt==="—"?"—":rawWt);
    const showLbs=wtNum&&wtNum!=="BW"&&wtNum!=="—";

    const card=dv({style:{
      background:"#13151b",border:"1px solid #1e2028",borderRadius:"10px",
      padding:"18px 16px",
    }});

    if(label){
      card.appendChild(dv({cls:"wf-exlabel",style:{marginBottom:"10px"}},label));
    }

    // Name row (smaller, above the big numbers)
    card.appendChild(dv({style:{
      fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif",
      fontSize:"22px",fontWeight:"700",color:"#aaa",lineHeight:"1.2",marginBottom:"8px",
    }},part.name));

    // Big numbers row: reps | weight
    const row=dv({style:{
      display:"grid",
      gridTemplateColumns:"1fr 1fr",
      alignItems:"center",
      gap:"10px",
    }});

    // LEFT: reps
    row.appendChild(dv({style:{
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
      fontSize:"64px",color:"#e8c547",letterSpacing:"1px",
      textAlign:"left",whiteSpace:"nowrap",lineHeight:"1",
    }},part.reps));

    // RIGHT: weight
    const wtRight=dv({style:{textAlign:"right"}});
    wtRight.appendChild(dv({style:{
      fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
      fontSize:"64px",color:"#e8c547",letterSpacing:"1px",
      lineHeight:"1",whiteSpace:"nowrap",
    }},showLbs?wtNum+" lbs":wtNum));
    if(lastUsed){
      wtRight.appendChild(dv({style:{
        fontFamily:"'Courier New',Courier,monospace",
        fontSize:"10px",color:"#555",marginTop:"3px",
      }},"last: "+lastUsed.weight));
    }
    row.appendChild(wtRight);

    card.appendChild(row);
    return card;
  }

  if(isSuperset){
    item.parts.forEach((part,pi)=>{
      body.appendChild(makeExCard(part,"SUPERSET "+(pi===0?"A":"B")));
      if(pi<item.parts.length-1){
        body.appendChild(dv({cls:"wf-sep"},"━━━ THEN ━━━"));
      }
    });
  } else {
    body.appendChild(makeExCard(item.parts[0],null));
  }

  // Button: one press per set (or superset round)
  const btnLabel=isSuperset?`COMPLETE SUPERSET ${w.setNum}`:`COMPLETE SET ${w.setNum}`;
  body.appendChild(bt({cls:"wf-complete-btn",onClick:()=>completeCurrentPart()},btnLabel));
  body.appendChild(bt({cls:"wf-skip-btn",onClick:()=>{if(confirm("Skip this exercise?"))skipExercise();}},"SKIP EXERCISE"));
}

function renderRestPhase(body,w,item){
  const remaining=Math.max(0,Math.ceil((w.restEnd-Date.now())/1000));
  const m=Math.floor(remaining/60);
  const s=remaining%60;
  const total=w.restTotal||60;
  const pct=((w.restEnd-Date.now())/(total*1000))*100;

  body.appendChild(dv({style:{textAlign:"center"}},dv({cls:"wf-label"},"REST")));

  const restBox=dv({cls:"wf-rest-box"});
  restBox.appendChild(dv({id:"wf-timer-text",cls:"wf-timer-big"},
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")));

  const pb=dv({cls:"wf-prog-bar"});
  pb.appendChild(dv({id:"wf-prog-fill",cls:"wf-prog-fill",style:{width:Math.max(0,Math.min(100,pct))+"%"}}));
  restBox.appendChild(pb);

  const rbtns=dv({cls:"wf-rest-btns"});
  rbtns.appendChild(bt({cls:"wf-rest-btn",onClick:()=>{
    // Always add to current remaining, never to the original total
    const now=Date.now();
    const cur=Math.max(0,Math.ceil((w.restEnd-now)/1000));
    w.restEnd=now+(cur+30)*1000;
    w.restTotal=cur+30;
  }},"+30s"));
  rbtns.appendChild(bt({cls:"wf-rest-btn",onClick:()=>{
    clearInterval(_timerInterval);_timerInterval=null;
    advanceAfterRest();
    render();
  }},"SKIP REST"));
  restBox.appendChild(rbtns);
  body.appendChild(restBox);
  renderNextPreview(body,w);
}

function renderLoggingPhase(body,w,item){
  if(!item){advanceToNextExercise();render();return;}
  const hasTimer=!w.coreDay&&w.logRestSecs;
  const titleName=item.parts.map(p=>p.name).join(" + ");

  // ════════════════════════════════════════════════
  // FINAL SET — no timer, no next preview, just log
  // ════════════════════════════════════════════════
  if(!hasTimer){
    const box=dv({cls:"wf-log-box"});
    box.appendChild(dv({cls:"wf-log-title"},"LOG — "+titleName.toUpperCase()));
    const inputs={};
    item.parts.forEach(part=>{
      const row=dv({cls:"wf-log-row"});
      row.appendChild(dv({cls:"wf-log-exname"},part.name));
      const progRaw=(part.weight&&part.weight!=="BW"&&part.weight!=="—")?part.weight:"";
      const progNum=progRaw?progRaw.match(/(\d+\.?\d*)/):null;
      const lastUsed=S.exerciseWeights[part.name];
      const rawWeight=progNum?progRaw:(lastUsed?lastUsed.weight:"");
      const numMatch=rawWeight?rawWeight.match(/(\d+\.?\d*)/):null;
      const prefill=numMatch?numMatch[1]:"";
      const inp=ip({cls:"wf-log-input",placeholder:"0",value:prefill,type:"number",min:"0",step:"2.5",inputmode:"decimal"});
      inputs[part.name]=inp;
      const wrap=dv({style:{display:"flex",alignItems:"center",gap:"5px"}});
      wrap.appendChild(inp);
      wrap.appendChild(sp({style:{fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"22px",color:"#555"}},"lbs"));
      row.appendChild(wrap);
      box.appendChild(row);
    });
    w._logInputs=inputs;
    box.appendChild(bt({cls:"wf-save-btn",style:{marginTop:"10px"},onClick:()=>{
      const logMap={};
      Object.entries(inputs).forEach(([n,inp])=>{if(inp.value.trim())logMap[n]=inp.value.trim();});
      saveLogAndContinue(logMap);
    }},"SAVE WEIGHTS"));
    body.appendChild(box);
    return;
  }

  // ════════════════════════════════════════════════
  // WITH TIMER — three distinct sections
  // ════════════════════════════════════════════════

  // ── SECTION 1: TIMER ─────────────────────────
  const restEnd=w.logRestEnd||Date.now();
  const remaining=Math.max(0,Math.ceil((restEnd-Date.now())/1000));
  const pct=w.logRestTotal?((restEnd-Date.now())/(w.logRestTotal*1000))*100:100;
  const isLast5=remaining<=5&&remaining>0;
  const timerSec=dv({style:{
    background:"#0c0d10",
    border:"2px solid "+(isLast5?"#e05252":"#e8c547"),
    borderRadius:"10px",padding:"20px 16px 16px",
    display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",
  }});
  timerSec.appendChild(dv({style:{
    fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",letterSpacing:"4px",
    fontSize:"11px",color:"#555",
  }},"REST — AUTO-ADVANCE WHEN ZERO"));
  timerSec.appendChild(dv({id:"wf-log-timer",style:{
    fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",
    fontSize:"100px",color:isLast5?"#e05252":"#e8c547",
    letterSpacing:"2px",lineHeight:"1",
  }},fmtMSS(remaining)));
  const pb=dv({cls:"wf-prog-bar",style:{width:"100%",height:"6px",marginTop:"2px"}});
  pb.appendChild(dv({id:"wf-log-fill",cls:"wf-prog-fill",style:{
    width:Math.max(0,Math.min(100,pct))+"%",
    background:isLast5?"#e05252":"#e8c547",
  }}));
  timerSec.appendChild(pb);
  const rbtns=dv({cls:"wf-rest-btns",style:{marginTop:"10px",width:"100%"}});
  rbtns.appendChild(bt({cls:"wf-rest-btn",onClick:()=>{
    const now=Date.now();
    const cur=Math.max(0,Math.ceil((w.logRestEnd-now)/1000));
    w.logRestEnd=now+(cur+30)*1000;
    w.logRestTotal=cur+30;
  }},"+30 SECONDS"));
  rbtns.appendChild(bt({cls:"wf-rest-btn",onClick:()=>{
    clearInterval(_timerInterval);_timerInterval=null;
    const logMap={};
    if(w._logInputs)Object.entries(w._logInputs).forEach(([n,inp])=>{if(inp.value&&inp.value.trim())logMap[n]=inp.value.trim();});
    if(!w._logSaved)commitLogWeights(logMap);
    advanceToNextExercise();render();
  }},"SKIP REST"));
  timerSec.appendChild(rbtns);
  body.appendChild(timerSec);

  // ── SECTION 2: LOG WEIGHTS ────────────────────
  const logSec=dv({style:{
    background:"#13151b",border:"1px solid #1e2028",borderRadius:"10px",
    padding:"16px",
  }});
  logSec.appendChild(dv({cls:"wf-log-title",style:{marginBottom:"12px"}},
    "LOG — "+titleName.toUpperCase()));

  const inputs={};

  if(w._logSaved){
    logSec.appendChild(dv({style:{
      background:"#0d1f12",border:"2px solid #6cc97e",borderRadius:"8px",
      padding:"14px 16px",display:"flex",flexDirection:"column",gap:"10px",
    }},
      dv({style:{
        fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"20px",
        letterSpacing:"3px",color:"#6cc97e",textAlign:"center",
      }},"✓ WEIGHTS SAVED"),
      ...item.parts.map(part=>{
        const logged=w.loggedWeights[part.name];
        return dv({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          dv({cls:"ss",style:{fontSize:"20px",fontWeight:"700",color:"#aaa"}},part.name),
          dv({style:{
            fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"24px",
            color:"#6cc97e",letterSpacing:"1px",
          }},logged?logged+" lbs":"—")
        );
      })
    ));
  } else {
    item.parts.forEach(part=>{
      const row=dv({cls:"wf-log-row"});
      row.appendChild(dv({cls:"wf-log-exname"},part.name));
      const progRaw=(part.weight&&part.weight!=="BW"&&part.weight!=="—")?part.weight:"";
      const progNum=progRaw?progRaw.match(/(\d+\.?\d*)/):null;
      const lastUsed=S.exerciseWeights[part.name];
      const rawWeight=progNum?progRaw:(lastUsed?lastUsed.weight:"");
      const numMatch=rawWeight?rawWeight.match(/(\d+\.?\d*)/):null;
      const prefill=numMatch?numMatch[1]:"";
      const inp=ip({cls:"wf-log-input",placeholder:"0",value:prefill,type:"number",min:"0",step:"2.5",inputmode:"decimal"});
      inputs[part.name]=inp;
      const wrap=dv({style:{display:"flex",alignItems:"center",gap:"5px"}});
      wrap.appendChild(inp);
      wrap.appendChild(sp({style:{fontFamily:"Impact,'Arial Narrow',Arial,sans-serif",fontSize:"22px",color:"#555"}},"lbs"));
      row.appendChild(wrap);
      logSec.appendChild(row);
    });
    logSec.appendChild(bt({cls:"wf-save-btn",style:{marginTop:"10px"},onClick:()=>{
      const logMap={};
      Object.entries(inputs).forEach(([n,inp])=>{if(inp.value.trim())logMap[n]=inp.value.trim();});
      commitLogWeights(logMap);
      render(); // re-render to show saved state; timer keeps running
    }},"SAVE WEIGHTS"));
  }

  if(Object.keys(inputs).length>0)w._logInputs=inputs;
  body.appendChild(logSec);

  // ── SECTION 3: NEXT EXERCISE ─────────────────
  renderNextPreview(body,w);
}
